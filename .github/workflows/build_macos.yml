name: macOS Build # 工作流的名称

on:
  workflow_dispatch:
  push:
    branches: [ "*" ] # 监听所有分支的推送
  pull_request:
    branches: [ "*" ]

jobs:
  build-macos:
    runs-on: macos-latest 

    steps:
    - name: 1. 拉取最新源码
      uses: actions/checkout@v4

    - name: 2. 配置 Python 3.12 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' 

    - name: 3. 安装依赖零件 
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller mediapipe babeldoc

    - name: 3.5. [关键] 预热模型缓存 (解决离线卡死问题)
      run: |
        echo "正在云端预下载 tiktoken 编码器模型..."
        # 强制触发 tiktoken 下载缓存，并指定缓存目录为软件资源内部
        export TIKTOKEN_CACHE_DIR="$GITHUB_WORKSPACE/Resource/Models/tiktoken"
        mkdir -p $TIKTOKEN_CACHE_DIR
        python -c "
        import tiktoken
        try:
            tiktoken.get_encoding('cl100k_base')
            tiktoken.get_encoding('o200k_base')
            print('✅ 离线模型拉取成功！')
        except Exception as e:
            print(f'⚠️ 模型拉取出现异常: {e}')
        "

    - name: 4. 运行魔法脚本进行打包
      run: |
        chmod +x build_mac.sh
        ./build_mac.sh

    - name: 5. 压制 DMG 镜像 
      run: |
        echo "正在打包 DMG 镜像以保护文件签名和权限..."
        hdiutil create -volname "AiNiee_macOS" -srcfolder dist/AiNiee.app -ov -format UDBZ AiNiee_macOS.dmg

    - name: 6. 上传最终产物给用户下载
      uses: actions/upload-artifact@v4
      with:
        name: AiNiee-macOS-AppleSilicon
        path: AiNiee_macOS.dmg