name: AiNiee macOS Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish DMG assets to a GitHub Release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag"
        required: false
        default: "v7.2.0-Mac"
        type: string
      release_name:
        description: "Release name"
        required: false
        default: "AiNiee 7.2.0 Mac"
        type: string
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-15
          - arch: x86_64
            runs_on: macos-15-intel
    runs-on: ${{ matrix.runs_on }}
    env:
      AINIEE_MACOS_ARCH: ${{ matrix.arch }}
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements-macos.txt
          python -m pip install --no-deps -r requirements_no_deps.txt
          python -m pip cache purge

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE_P12 != ''
        run: |
          security create-keychain -p "$RUNNER_TEMP" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP" build.keychain
          echo "$MACOS_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_TEMP" build.keychain

      - name: Build app bundle
        run: python Tools/pyinstall_macos.py --target-arch "$AINIEE_MACOS_ARCH"

      - name: Package DMG
        run: |
          if [[ -n "$CODESIGN_IDENTITY" && -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            bash scripts/notarize_macos.sh
          else
            bash scripts/package_dmg.sh
          fi

      - name: Generate SHA256
        run: |
          DMG_PATH="dist/AiNiee-macOS-${AINIEE_MACOS_ARCH}.dmg"
          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiNiee-macOS-${{ matrix.arch }}
          path: |
            dist/AiNiee-macOS-${{ matrix.arch }}.dmg
            dist/AiNiee-macOS-${{ matrix.arch }}.dmg.sha256

  release-macos:
    name: Publish macOS Release
    needs: build-macos
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate release inputs
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          if [[ -z "$RELEASE_TAG" || -z "$RELEASE_NAME" ]]; then
            echo "release_tag and release_name are required when publish_release is true." >&2
            exit 1
          fi

      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: AiNiee-macOS-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_name }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.dmg.sha256
          token: ${{ secrets.AINIEE || github.token }}
