name: AiNiee macOS Build

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish DMG assets to a GitHub Release"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag, use auto to derive from version.json"
        required: false
        default: "auto"
        type: string
      release_name:
        description: "Release name"
        required: false
        default: "Mac Release"
        type: string
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-15
          - arch: x86_64
            runs_on: macos-15-intel
    runs-on: ${{ matrix.runs_on }}
    env:
      AINIEE_MACOS_ARCH: ${{ matrix.arch }}
      MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install --no-deps -r requirements_no_deps.txt
          python -m pip cache purge

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE_P12 != ''
        run: |
          security create-keychain -p "$RUNNER_TEMP" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$RUNNER_TEMP" build.keychain
          echo "$MACOS_CERTIFICATE_P12" | base64 -d > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_TEMP" build.keychain

      - name: Build app bundle
        run: python Tools/pyinstall_macos.py --target-arch "$AINIEE_MACOS_ARCH"

      - name: Package DMG
        run: |
          if [[ -n "$CODESIGN_IDENTITY" && -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            bash scripts/notarize_macos.sh
          else
            bash scripts/package_dmg.sh
          fi

      - name: Generate SHA256
        run: |
          DMG_PATH="dist/AiNiee-macOS-${AINIEE_MACOS_ARCH}.dmg"
          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiNiee-macOS-${{ matrix.arch }}
          path: |
            dist/AiNiee-macOS-${{ matrix.arch }}.dmg
            dist/AiNiee-macOS-${{ matrix.arch }}.dmg.sha256

  release-macos:
    name: Publish macOS Release
    needs: build-macos
    if: github.event_name == 'workflow_dispatch' && inputs.publish_release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release inputs
        id: release_metadata
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import sys

          release_tag = os.environ["RELEASE_TAG"].strip()
          release_name = os.environ["RELEASE_NAME"].strip()

          if not release_tag or release_tag.lower() == "auto":
              with open("Resource/Version/version.json", encoding="utf-8") as f:
                  version_data = json.load(f)

              version_text = version_data.get("version") or version_data.get("Version") or ""
              match = re.search(r"\d+(?:\.\d+)+", version_text)
              if not match:
                  print("Unable to derive release_tag from Resource/Version/version.json.", file=sys.stderr)
                  sys.exit(1)

              release_tag = f"v{match.group(0)}-Mac"

          if not release_name:
              print("release_name is required when publish_release is true.", file=sys.stderr)
              sys.exit(1)

          print(f"release_tag={release_tag}")
          print(f"release_name={release_name}")
          PY

      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: AiNiee-macOS-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_metadata.outputs.release_tag }}
          name: ${{ steps.release_metadata.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.dmg.sha256
          token: ${{ secrets.AINIEE }}
