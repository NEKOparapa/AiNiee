name: 错误报告 | Bug Report
description: 异常问题反馈模板
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请按照实际情况填写这个反馈模板，带*的为必填项

  - type: textarea
    id: bug-description
    attributes:
      label: 问题描述
      description: Please provide a detailed description of the bug.
    validations:
      required: true

  - type: textarea
    id: error-log
    attributes:
      label: 报错日志
      description: 复制出错终端日志内容或者截图
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: 软件版本
      description: 填入使用的软件版本号
    validations:
      required: false

  - type: input
    id: api
    attributes:
      label: 接口平台
      description: 填入使用的接口平台
    validations:
      required: false

  - type: input
    id: api-url
    attributes:
      label: 接口地址
      description: 使用官方在线接口时不用填写
    validations:
      required: false

  - type: input
    id: api-format
    attributes:
      label: 接口格式
      description: 使用官方在线接口时不用填写
    validations:
      required: false

  - type: input
    id: model-name
    attributes:
      label: 模型名称
      description: 详细的型号
    validations:
      required: true

  - type: input
    id: project-type
    attributes:
      label: 文件类型
    validations:
      required: true

  - type: input
    id: source-language
    attributes:
      label: 原文语言
    validations:
      required: true

  - type: input
    id: target-language
    attributes:
      label: 译文语言
    validations:
      required: true

  - type: input
    id: parallel-tasks
    attributes:
      label: 并行任务数
      description: 任务设置中的并发任务数
    validations:
      required: true


  - type: dropdown
    id: prompt-mode
    attributes:
      label: 提示词预设
      description: 提示词设置的基础提示词预设
      options:
        - 通用
        - 思维链
        - 推理模型
        - 本地模型
        - 自定义提示词
    validations:
      required: true



